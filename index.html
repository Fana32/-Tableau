<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="css/bootstrap.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <h1 class="text-center text-uppercase text-primary">Gestion des Contacts </h1>
        <div class="row">
            <div class="col-md-4"> 
                <div class="card">
                    <div class="card-header">Ajout Contact</div>
                    <div class="card-body">
                        <form action="">
                            <input type="text" id="indice" hidden>
                            <div class="form-group">
                                <label for="">Prenom</label>
                                <input type="text" name="prenom" id="prenom" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="">Nom</label>
                                <input type="text" name="nom" id="nom" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for=""> Tel</label>
                                <input type="tel" name="tel" id="tel" class="form-control">
                            </div>
                             <div class="mt-2" >
                                <button  class="btn btn-success btn-sm " type="button" id="btn-add">Ajouter</button>

                             </div> 
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-8"> 
            

<div class="container mt-4">

    <div class="input-group">
        <span class="input-group-text">🔍</span>
        <input type="text"class="form-control" id="recherche" placeholder="Rechercher">
              </div>
             </div> <br>
                <table class="table table-bordered table-striped">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Prenom</th>
                            <th>Nom</th>
                            <th>Tel</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="list-contact">
                       
                    </tbody>
                </table>
                <nav class="mt-3">
    <ul class="pagination justify-content-center" id="pagination"></ul>
</nav>
            </div>
        </div>
    </div>
    <script async src="script.js"></script>
</body>
</html>
